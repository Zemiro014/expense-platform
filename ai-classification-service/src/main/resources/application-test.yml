spring:
  datasource:
    url: jdbc:h2:mem:ai_classification_test_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  kafka:
    bootstrap-servers: localhost:9092

app:
  ai:
    ollama:
      base-url: http://localhost:11434
      model: qwen2.5:1.5b

  kafka:
    topics:
      receipt-created: receipt-created
      receipt-classified: receipt-classified

management:
  tracing:
    enabled: false