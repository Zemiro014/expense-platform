version: '3.3'

services:
  expense_platform:
    image: postgres:15-alpine
    container_name: webflux-postgres
    restart: always
    environment:
      POSTGRES_USER: devAdmin
      POSTGRES_PASSWORD: devAdmin
      POSTGRES_DB: expense_platform_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devAdmin -d expense_platform_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318" # Porta HTTP do OTLP que deu erro na sua aplicação
      - "8889:8889"
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
  # NOVO: Prometheus para visualizar os gráficos de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # Mapeia o arquivo de configuração
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs

      - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL

      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_MIN_INSYNC_REPLICAS=1
    volumes:
      - kafka_data:/bitnami/kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

  receipt-service:
    build:
      context: ./receipt-service
      dockerfile: Dockerfile
    container_name: receipt-service
    ports:
      - "8180:8180"
    environment:
      R2DBC_URL: r2dbc:postgresql://expense_platform/expense_platform_db
      DB_USERNAME: devAdmin
      DB_PASSWORD: devAdmin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      - expense_platform
      - kafka
      - jaeger
    labels:
      logging: "promtail"
      service: "receipt-service"

  validation-service:
    build:
      context: ./validation_service
      dockerfile: Dockerfile
    container_name: validation-service
    ports:
      - "8181:8181"
    environment:
      JDBC_URL: jdbc:postgresql://expense_platform:5432/expense_platform_db
      DB_USERNAME: devAdmin
      DB_PASSWORD: devAdmin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP_ID: validation-service-group
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      - expense_platform
      - kafka
      - jaeger
      - receipt-service
    labels:
      logging: "promtail"
      service: "validation-service"
  
  notification-service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8182:8182"
    environment:
      JDBC_URL: jdbc:postgresql://expense_platform:5432/expense_platform_db
      DB_USERNAME: devAdmin
      DB_PASSWORD: devAdmin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP_ID: notification-service-group
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      - expense_platform
      - kafka
      - jaeger
      - receipt-service
      - validation-service
    labels:
      logging: "promtail"
      service: "notification-service"

  ai-classification-service:
    build:
      context: ./ai-classification-service
      dockerfile: Dockerfile
    container_name: ai-classification-service
    ports:
      - "8183:8183"
    environment:
      JDBC_URL: jdbc:postgresql://expense_platform:5432/expense_platform_db
      DB_USERNAME: devAdmin
      DB_PASSWORD: devAdmin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP_ID: ai-classification-service-group
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
    depends_on:
      - expense_platform
      - kafka
      - jaeger
      - receipt-service
      - validation-service
      - ollama
    labels:
      logging: "promtail"
      service: "ai-classification-service"

# AI Agent
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama-pull
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      sh -c "ollama pull qwen2.5:1.5b"
    depends_on:
      - ollama

volumes:
  kafka_data:
  postgres_data:
  grafana_data:
  ollama_data: