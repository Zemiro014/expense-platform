server:
  port: 8184

spring:
  application:
    name: document-extraction-service

  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5433/expense_platform_db}
    username: ${DB_USERNAME:devAdmin}
    password: ${DB_PASSWORD:devAdmin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

app:
  storage:
    base-path: /app/data/uploads
  kafka:
    topics:
      receipt-document-extracted: receipt-document-extracted

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  tracing:
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  level:
    root: INFO
    com.jeronimo.validation_service: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN