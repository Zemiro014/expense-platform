server:
  port: 8182

spring:
  application:
    name: notification_service

  datasource:
    url: jdbc:postgresql://localhost:5433/expense_platform_db
    username: devAdmin
    password: devAdmin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  kafka:
    bootstrap-servers: localhost:9094
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest

app:
  kafka:
    topics:
      receipt-validated: receipt-validated

logging:
  level:
    root: INFO
    com.jeronimo.validation_service: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN